<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Product Page</title>

    <!-- Bootstrap link -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

    <!-- My CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    

        <!-- navbar -->
        <nav class="navbar navbar-dark bg-dark">
            <div class="container">
                <a href="#" class="navbar-brand">ShopEasy</a>

                <div class="text-white">
                    🛒 Cart:

                    <span id="addToCartCounter" class="badge bg-danger">0</span>

                </div>
            </div>
        </nav>

        <!-- product card -->

        <div class="container p-5">

            <div class="card product-card">
                <img src="images/shoes.jpg" class="card-img-top product-img" alt="Product Image">

                <div class="card-body">
                    <h3 class="card-title">Nike Running Shoes</h3>
                    <div class="text-success">$59</div>
                    <p class="card-text">Lightweight running shoes designed for comfort,
                    performance, and everyday use.</p>

                    <button id="cartBtn" class="btn btn-primary w-100">Add to Cart</button>
                </div>
            </div>
        </div>



    


<script src="script.js"></script>

</body>

</html>
